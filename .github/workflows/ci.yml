name: Python CI (Flagship)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 提前選擇 Node.js 24 以消除棄用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        # 啟用快取提升速度
        cache: 'pip'
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint Analysis (PEP8)
      run: |
        # 檢查關鍵錯誤
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # 警告與裝飾
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Unit Test (Module Import)
      run: |
        # 核心：修正類別導入測試
        python -c "from transcribe_and_translate import MediaSubtitleEngineer; print('✅ MediaSubtitleEngineer Import Success!')"
        python -c "from main import app; print('✅ FastAPI Backend Import Success!')"