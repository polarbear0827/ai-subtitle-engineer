<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle|雙模轉錄</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p:#6366f1; --s:#a855f7; --bg:#0f172a; --cb:rgba(30,41,59,0.75); --tx:#f8fafc; --ac:#22d3ee; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit',sans-serif; background:radial-gradient(circle at top right,#1e1b4b,#0f172a); color:var(--tx); min-height:100vh; display:flex; justify-content:center; align-items:center; }
        .container { width:92%; max-width:800px; padding:40px; background:var(--cb); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); border-radius:24px; }
        h1 { font-size:2.4rem; background:linear-gradient(to right,var(--ac),var(--s)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; margin-bottom:25px; }
        .tabs { display:flex; gap:10px; margin-bottom:20px; background:rgba(0,0,0,0.2); padding:5px; border-radius:12px; }
        .tab { flex:1; padding:12px; text-align:center; cursor:pointer; border-radius:10px; color:#94a3b8; font-weight:600; transition:0.3s; }
        .tab.active { background:var(--p); color:white; }
        .m-sec { display:none; margin-bottom:20px; }
        .m-sec.active { display:block; animation:fade 0.4s; }
        @keyframes fade { from{opacity:0;} to{opacity:1;} }
        input, select { width:100%; padding:12px; background:rgba(15,23,42,0.6); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; outline:none; }
        .file-drop { border:2px dashed rgba(255,255,255,0.2); padding:30px; text-align:center; border-radius:16px; cursor:pointer; }
        .btn { width:100%; padding:16px; background:linear-gradient(135deg,var(--p),var(--s)); border:none; border-radius:12px; color:white; font-weight:600; cursor:pointer; }
        #log { margin-top:20px; background:#000; padding:15px; height:200px; overflow-y:auto; font-family:'JetBrains Mono'; font-size:0.85rem; border-radius:12px; }
        #da { margin-top:20px; text-align:center; display:none; }
        .dl { padding:12px 30px; background:var(--ac); color:#0f172a; text-decoration:none; border-radius:50px; font-weight:600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Subtitle Engineer</h1>
        <div class="tabs"><div class="tab active" data-t="url-m">網址模式</div><div class="tab" data-t="file-m">檔案模式</div></div>
        <form id="f">
            <input type="hidden" name="mode" id="mi" value="url">
            <div id="url-m" class="m-sec active"><label>影片網址</label><input type="text" name="url" placeholder="https://..."></div>
            <div id="file-m" class="m-sec"><label>上傳影片</label><div class="file-drop" onclick="fi.click()"><p id="fn">點擊上傳影片</p><input type="file" name="file" id="fi" style="display:none" accept="video/*"></div></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px;">
                <select name="model"><option value="small">Small</option><option value="medium">Medium</option><option value="large-v3" selected>Large-v3</option></select>
                <input type="text" name="lang" placeholder="語言(選填)">
            </div>
            <button type="submit" class="btn" id="bt" style="margin-top:20px">開始自動轉錄</button>
        </form>
        <div id="log"></div>
        <div id="da"><p style="color:#4ade80; margin-bottom:10px;">✨ 處理完成！</p><a href="#" class="dl" id="dl" download>下載 SRT</a></div>
    </div>
    <script>
        const tabs=document.querySelectorAll('.tab'), secs=document.querySelectorAll('.m-sec'), mi=document.getElementById('mi'), f=document.getElementById('f'), fi=document.getElementById('fi'), fn=document.getElementById('fn'), log=document.getElementById('log'), da=document.getElementById('da'), dl=document.getElementById('dl'), bt=document.getElementById('bt');
        tabs.forEach(t=>t.onclick=()=>{ tabs.forEach(x=>x.classList.remove('active')); secs.forEach(x=>x.classList.remove('active')); t.classList.add('active'); document.getElementById(t.dataset.t).classList.add('active'); mi.value=t.dataset.t==='url-m'?'url':'file'; });
        fi.onchange=()=>{ if(fi.files[0]) fn.innerText=已選: ; };
        f.onsubmit=async(e)=>{
            e.preventDefault(); log.innerHTML=''; log.style.display='block'; da.style.display='none'; bt.disabled=true; bt.innerText='處理中...';
            const fd=new FormData(f), ep=mi.value==='url'?'/api/transcribe':'/api/upload';
            const r=await fetch(ep,{method:'POST', body:fd}), d=await r.json(), es=new EventSource(/api/logs/);
            es.onmessage=(ev)=>{
                const m=ev.data; if(m.startsWith('COMPLETED:')){ dl.href=m.replace('COMPLETED:',''); da.style.display='block'; bt.disabled=false; bt.innerText='開始自動轉錄'; es.close(); return; }
                const v=document.createElement('div'); v.style.color=m.includes('✅')?'#4ade80':'#94a3b8'; v.innerText=> ; log.appendChild(v); log.scrollTop=log.scrollHeight;
            };
        };
    </script>
</body>
</html>
